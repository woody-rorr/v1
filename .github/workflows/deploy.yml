name: Deploy Backend to ECS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BASE: 239460481239.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: mcp-agents-staging-cluster

jobs:
  deploy-user-service:
    name: user-service 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 빌드 & ECR 푸시
        run: |
          IMAGE=${{ env.ECR_BASE }}/mcp-agents-staging-user-service:latest
          docker build --platform linux/amd64 \
            -t $IMAGE \
            ./backend/user-service
          docker push $IMAGE

      - name: ECS 재배포
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service mcp-agents-staging-user-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
